<section class="image-full-width">
    <div class="wrapper">
        <div class="image">
            <picture>
                <source media="(min-width: 1200px)" srcset="{{ glide:image width='1300' format='webp' quality="75" }}" type="image/webp">
                <source media="(max-width: 1199px)" srcset="{{ glide:image width='1300' format='webp' quality="75" }}" type="image/webp">
                <img src="{{ glide:image width='100%' height='100%' }}" alt="{{ image:alt }}" loading="lazy" decoding="async">
            </picture>
        </div>
    </div>
</section>
